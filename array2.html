<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Javascript Array Method</h2>
    <h2>join()and pop ()</h2>
    <p>the join()method joins array element into a string and the pop()method removes the last element from an array.</p>
<p id="myjoin"></p>
<p id="myfirstpop"></p>
<p id="mysecondpop"></p>
<script>
var fruit = ["Bannana","orange","grapes","mango",];
document.getElementById("myjoin").innerHTML= fruit.join("*");
document.getElementById("myfirstpop").innerHTML= fruit;fruit.pop();
document.getElementById("mysecondpop").innerHTML= fruit;


</script>
</body>
</html>
